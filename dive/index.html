<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/dive-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>DIVE</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("dive.theme");
          var theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          var root = document.documentElement;
          root.classList.remove("dark", "light");
          root.classList.add(theme);
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
        // S-044 (P1-33): make first paint's <html lang> match the persisted
        // locale so assistive tech does not mispronounce before React mounts.
        try {
          var storedLocale = localStorage.getItem("dive:locale");
          var locale = "ko";
          if (storedLocale) {
            var parsed = JSON.parse(storedLocale);
            var value = parsed && parsed.state && parsed.state.locale;
            if (value === "ko" || value === "en") locale = value;
          }
          document.documentElement.lang = locale;
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
