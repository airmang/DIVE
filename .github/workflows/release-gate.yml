name: release-gate

on:
  workflow_dispatch:
    inputs:
      release_owner:
        description: "Release owner approving this release-gate run"
        required: true

permissions:
  contents: read

jobs:
  windows-release-gate:
    name: windows release gate (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - label: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: dive/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install frontend dependencies
        working-directory: dive
        run: pnpm install --frozen-lockfile
      - name: Build Pi sidecar (${{ matrix.target }})
        working-directory: dive
        run: |
          npm --prefix pi-sidecar ci
          node pi-sidecar/build-sidecar.mjs --target ${{ matrix.target }}
      - name: Developer gate preflight
        working-directory: dive
        run: |
          pnpm typecheck
          pnpm lint --max-warnings 0
          pnpm build
          pnpm format:check
          pnpm verify:production-wire
          pnpm verify:v4
      - name: Rust gate
        working-directory: dive/src-tauri
        run: |
          cargo fmt --all -- --check
          cargo test --features dev-mock --all-targets
          cargo clippy --features dev-mock --all-targets -- -D warnings
          cargo check --release
          bash ./scripts/verify-release-mock-guard.sh
      - name: Install tauri-driver and Edge driver helper
        run: |
          cargo install tauri-driver --locked
          # Third-party helper, no published crate/release — pinned to the
          # upstream main HEAD as of 2026-07-20 to avoid an unreviewed
          # supply-chain change landing silently on every CI run.
          # Upstream: https://github.com/chippers/msedgedriver-tool
          cargo install --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $driverTool = Join-Path $cargoBin "msedgedriver-tool.exe"
          if (-not (Test-Path $driverTool)) { throw "msedgedriver-tool.exe not found at $driverTool" }
          & $driverTool
          echo $cargoBin >> $env:GITHUB_PATH
          $driver = Get-ChildItem -Path .,$env:USERPROFILE -Recurse -Filter msedgedriver.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $driver) { throw "msedgedriver.exe not found after msedgedriver-tool" }
          echo $driver.Directory.FullName >> $env:GITHUB_PATH
      - name: Build Pi sidecar ${{ matrix.label }}
        working-directory: dive
        run: pnpm build:sidecar -- --target ${{ matrix.target }}
      - name: Build NSIS ${{ matrix.label }}
        working-directory: dive
        run: pnpm tauri build --target ${{ matrix.target }} --bundles nsis
      - name: Run installed-app release smoke (${{ matrix.label }})
        working-directory: dive
        env:
          RELEASE_OWNER: ${{ github.event.inputs.release_owner }}
        run: |
          $env:DIVE_RELEASE_TESTER = "github-actions-${{ matrix.label }}"
          $env:DIVE_RELEASE_OWNER = $env:RELEASE_OWNER
          pnpm release:smoke -- --json-out release-smoke-${{ matrix.label }}.json
      - name: Upload tested NSIS installer (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-windows-${{ matrix.label }}-nsis
          path: dive/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
      - name: Upload release smoke evidence (${{ matrix.label }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-release-smoke-${{ matrix.label }}
          path: dive/release-smoke-${{ matrix.label }}.json
          if-no-files-found: error
          retention-days: 30
