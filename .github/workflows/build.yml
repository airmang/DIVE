name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-check:
    name: frontend (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dive
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: dive/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test:unit

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm verify:v4

  rust-check:
    name: rust (fmt + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dive/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: install webkit2gtk (tauri Linux dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: dive/pi-sidecar/package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dive/src-tauri

      - name: Build Pi sidecar for Linux cargo checks
        working-directory: dive
        run: |
          npm --prefix pi-sidecar ci
          node pi-sidecar/build-sidecar.mjs

      - run: cargo fmt --all -- --check

      - run: cargo clippy --features dev-mock --all-targets -- -D warnings
      # Feature-less pass keeps the production build (no dev-mock) warning-free —
      # this is what enforces the cfg(any(test, feature = "dev-mock")) gates.
      - run: cargo clippy -- -D warnings

      - run: cargo test --features dev-mock --all-targets

      - run: cargo check --release

  build-windows:
    name: build ${{ matrix.label }}
    needs: [frontend-check, rust-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: dive
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: dive/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dive/src-tauri
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: install tauri-driver and Edge driver helper
        run: |
          cargo install tauri-driver --locked
          # Third-party helper, no published crate/release — pinned to the
          # upstream main HEAD as of 2026-07-20 to avoid an unreviewed
          # supply-chain change landing silently on every CI run.
          # Upstream: https://github.com/chippers/msedgedriver-tool
          cargo install --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $driverTool = Join-Path $cargoBin "msedgedriver-tool.exe"
          if (-not (Test-Path $driverTool)) { throw "msedgedriver-tool.exe not found at $driverTool" }
          & $driverTool
          echo $cargoBin >> $env:GITHUB_PATH
          $driver = Get-ChildItem -Path .,$env:USERPROFILE -Recurse -Filter msedgedriver.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $driver) { throw "msedgedriver.exe not found after msedgedriver-tool" }
          echo $driver.Directory.FullName >> $env:GITHUB_PATH

      - name: build Pi sidecar (${{ matrix.target }})
        run: |
          npm --prefix pi-sidecar ci
          node pi-sidecar/build-sidecar.mjs --target ${{ matrix.target }}

      - name: tauri build (${{ matrix.target }})
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: installed-app smoke (${{ matrix.label }})
        # Non-blocking: the smoke opens a WebDriver (tauri-driver + msedgedriver)
        # session against the app's WebView2 runtime, and the current GitHub
        # Windows runner images (both x64 and windows-11-arm) ship a WebView2 /
        # msedgedriver combination whose session POST times out — an upstream
        # runner-image regression the installer build is unaffected by. Failing
        # the job on an un-runnable post-build check would pin the badge red for
        # an infra reason and mask real regressions, so the check is advisory:
        # its JSON evidence is still uploaded below for visibility.
        continue-on-error: true
        env:
          DIVE_RELEASE_TESTER: github-actions-${{ matrix.label }}
        run: pnpm release:smoke -- --json-out build-release-smoke-${{ matrix.label }}.json

      - name: upload NSIS installer
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-${{ matrix.label }}-nsis
          path: dive/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: upload installed-app smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-${{ matrix.label }}-installed-smoke
          path: dive/build-release-smoke-${{ matrix.label }}.json
          if-no-files-found: error
          retention-days: 14

  # macOS distribution (Tier 1: unsigned, consistent with the unsigned Windows
  # NSIS installers). A separate job — the build-windows steps are
  # PowerShell/msedgedriver/WebView2-shaped and do not apply to macOS. The Pi
  # sidecar SEA is host-only, so each mac arch needs its own runner. The primary
  # artifact is a zipped .app (users unzip and drag to Applications, matching the
  # rc.4 mac release); a .dmg is attempted best-effort in a later step because
  # Tauri's AppleScript-based dmg bundler can fail on headless CI.
  build-macos:
    name: build ${{ matrix.label }}
    needs: [frontend-check, rust-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: dive
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: dive/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dive/src-tauri
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: build Pi sidecar (${{ matrix.target }})
        run: |
          npm --prefix pi-sidecar ci
          node pi-sidecar/build-sidecar.mjs --target ${{ matrix.target }}

      - name: tauri build .app (${{ matrix.target }})
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app

      - name: zip .app bundle
        run: |
          set -euo pipefail
          app="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' | head -1)"
          if [ -z "$app" ]; then echo "no .app bundle found"; exit 1; fi
          ditto -c -k --keepParent "$app" "DIVE-${{ matrix.label }}.app.zip"
          ls -lh "DIVE-${{ matrix.label }}.app.zip"

      - name: tauri build .dmg (best-effort)
        id: dmg
        continue-on-error: true
        run: pnpm tauri build --target ${{ matrix.target }} --bundles dmg

      - name: upload .app.zip
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-${{ matrix.label }}-app
          path: dive/DIVE-${{ matrix.label }}.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: upload .dmg (best-effort)
        if: ${{ !cancelled() && steps.dmg.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-${{ matrix.label }}-dmg
          path: dive/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 14
