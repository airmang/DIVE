name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend-check:
    name: frontend (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dive
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dive/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm verify:v4

  rust-check:
    name: rust (fmt + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dive/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: install webkit2gtk (tauri Linux dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dive/src-tauri

      - run: cargo fmt --all -- --check

      - run: cargo clippy --features dev-mock --all-targets -- -D warnings

      - run: cargo test --features dev-mock --all-targets

      - run: cargo check --release

  build-windows:
    name: build ${{ matrix.label }}
    needs: [frontend-check, rust-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: dive
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dive/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dive/src-tauri
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: tauri build (${{ matrix.target }})
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: DIVE-${{ matrix.label }}-nsis
          path: dive/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
